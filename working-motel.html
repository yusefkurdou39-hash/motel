            // Add event listeners for automatic calculation
            const daysInput = document.querySelector('#guestForm input[name="days"]');
            const priceInput = document.querySelector('#guestForm input[name="pricePerDay"]');
            
            if (daysInput && priceInput) {
                daysInput.addEventListener('input', calculateTotal);
                priceInput.addEventListener('input', calculateTotal);
            }
            const extrasContainer = document.getElementById('extrasContainer');
            if (extrasContainer) extrasContainer.innerHTML = '';
            calculateTotal();
            updatePageText();
        }

        function hideGuestForm() {
            document.getElementById('guestForm').classList.add('hidden');
            setGuestFormAddMode();
            updatePageText();
        }

        function showAddExpenseForm() {
            document.getElementById('expenseForm').classList.remove('hidden');
            document.querySelector('#expenseForm input[name="date"]').value = new Date().toISOString().split('T')[0];
        }

        function hideExpenseForm() {
            document.getElementById('expenseForm').classList.add('hidden');
        }

        function onRoomChange(select) {
            const roomNumber = select.value;
            const option = select.options[select.selectedIndex];
            const capacity = parseInt(option.dataset.capacity) || 1;
            const statusInfo = document.getElementById('roomStatusInfo');
            const familySection = document.getElementById('familyMembersSection');
            const familyContainer = document.getElementById('familyMembersContainer');
            const saveBtn = document.getElementById('saveGuestBtn');
            
            if (!roomNumber) {
                statusInfo.textContent = '';
                familySection.style.display = 'none';
                return;
            }

            // Check if room is occupied (ignore the guest currently being edited)
            const guests = getFromStorage(CONFIG.STORAGE_KEYS.GUESTS, []);
            const now = new Date();
            const activeGuest = guests.find(g => {
                if (g.room !== roomNumber || new Date(g.checkOut) <= now) return false;
                if (editingGuestId != null && (g.id === editingGuestId || String(g.id) === String(editingGuestId))) return false;
                return true;
            });

            if (activeGuest) {
                statusInfo.style.color = '#e53e3e';
                statusInfo.textContent = `⚠️ Reserved until ${activeGuest.checkOut}`;
                saveBtn.disabled = true;
                saveBtn.style.opacity = '0.5';
                saveBtn.style.cursor = 'not-allowed';
            } else {
                statusInfo.style.color = '#38a169';
                statusInfo.textContent = '✅ Available';
                saveBtn.disabled = false;
                saveBtn.style.opacity = '1';
                saveBtn.style.cursor = 'pointer';
            }

            // Show family member fields based on capacity (capacity - 1 because first is main guest)
            familyContainer.innerHTML = '';
            if (capacity > 1) {
                familySection.style.display = 'block';
                for (let i = 1; i < capacity; i++) {
                    const div = document.createElement('div');
                    div.style.cssText = 'margin-bottom: 10px; display: grid; grid-template-columns: 1.5fr 1fr 1fr; gap: 8px;';
                    div.innerHTML = `
                        <div>
                            <label style="font-size: 13px; display: block; margin-bottom: 5px;" data-en="Member ${i} Name" data-ar="اسم العضو ${i}" data-ku="ناوی ئەندامی ${i}">Member ${i} Name</label>
                            <input type="text" name="familyMemberName" placeholder="Enter name" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 5px;">
                        </div>
                        <div>
                            <label style="font-size: 13px; display: block; margin-bottom: 5px;" data-en="Passport / ID" data-ar="الجواز / الهوية" data-ku="پاسپۆرت / ناسنامە">Passport / ID</label>
                            <input type="text" name="familyMemberPassport" placeholder="ID" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 5px;">
                        </div>
                        <div>
                            <label style="font-size: 13px; display: block; margin-bottom: 5px;" data-en="Phone" data-ar="الهاتف" data-ku="تەلەفۆن">Phone</label>
                            <input type="text" name="familyMemberPhone" placeholder="Phone" style="width: 100%; padding: 8px; border: 1px solid #e2e8f0; border-radius: 5px;">
                        </div>
                    `;
                    familyContainer.appendChild(div);
                }
                updatePageText();
            } else {
                familySection.style.display = 'none';
            }
        }

        async function saveGuest(event) {
            event.preventDefault();
            
            const formData = new FormData(event.target);
            const editGuestIdVal = (formData.get('guestId') || '').toString().trim();
            const isEdit = editGuestIdVal !== '';

            if (isEdit) {
                if (!checkPermission('edit')) return;
            } else {
                if (!checkPermission('add')) return;
            }

            const guests = getFromStorage(CONFIG.STORAGE_KEYS.GUESTS, []);
            const roomNumber = formData.get('room');
            const checkOutDate = formData.get('checkOut');
            const now = new Date();
            const editId = isEdit ? parseInt(editGuestIdVal, 10) : NaN;

            const activeGuest = guests.find(g => {
                if (g.room !== roomNumber || new Date(g.checkOut) <= now) return false;
                if (isEdit && (g.id === editId || String(g.id) === String(editId))) return false;
                return true;
            });
            if (activeGuest) {
                showToast(`Room ${roomNumber} is already occupied until ${activeGuest.checkOut}`, 'error');
                return;
            }

            const familyNames = Array.from(document.querySelectorAll('#guestForm input[name="familyMemberName"]'));
            const familyPassports = Array.from(document.querySelectorAll('#guestForm input[name="familyMemberPassport"]'));
            const familyPhones = Array.from(document.querySelectorAll('#guestForm input[name="familyMemberPhone"]'));
            const familyMembers = familyNames.map((nameInput, i) => ({
                name: (nameInput.value || '').trim(),
                idPassport: (familyPassports[i]?.value || '').trim(),
                phone: (familyPhones[i]?.value || '').trim()
            })).filter(m => m.name || m.idPassport || m.phone);

            const extras = collectGuestExtrasFromForm();
            const extrasTotal = extras.reduce((sum, x) => sum + (parseFloat(x.total) || 0), 0);
            const roomAmount = parseFloat(formData.get('amount')) || 0;

            if (isEdit) {
                const idx = guests.findIndex(g => g.id === editId || String(g.id) === String(editId));
                if (idx === -1) {
                    showToast('Guest not found', 'error');
                    return;
                }
                guests[idx] = {
                    ...guests[idx],
                    name: formData.get('name'),
                    idPassport: formData.get('idPassport'),
                    room: roomNumber,
                    phone: formData.get('phone'),
                    checkIn: formData.get('checkIn'),
                    checkOut: checkOutDate,
                    days: parseInt(formData.get('days'), 10),
                    pricePerDay: parseFloat(formData.get('pricePerDay')),
                    amount: roomAmount,
                    paymentStatus: formData.get('paymentStatus'),
                    familyMembers: familyMembers,
                    extras: extras,
                    extrasTotal: extrasTotal
                };
                saveToStorage(CONFIG.STORAGE_KEYS.GUESTS, guests);
                try { await pushStateToServer(CONFIG.STORAGE_KEYS.GUESTS); } catch (e) { /* ignore */ }
                refreshCheckoutNotificationBadge();
                hideGuestForm();
                showToast(T('saved'), 'success');
                loadPage('guests');
                return;
            }

            const newGuest = {
                id: Date.now(),
                name: formData.get('name'),
                idPassport: formData.get('idPassport'),
                room: roomNumber,
                phone: formData.get('phone'),
                checkIn: formData.get('checkIn'),
                checkOut: checkOutDate,
                days: parseInt(formData.get('days'), 10),
                pricePerDay: parseFloat(formData.get('pricePerDay')),
                amount: roomAmount,
                paymentStatus: formData.get('paymentStatus'),
                familyMembers: familyMembers,
                extras: extras,
                extrasTotal: extrasTotal
            };

            guests.push(newGuest);
            saveToStorage(CONFIG.STORAGE_KEYS.GUESTS, guests);
            try { await pushStateToServer(CONFIG.STORAGE_KEYS.GUESTS); } catch (e) { /* ignore */ }
            refreshCheckoutNotificationBadge();

            hideGuestForm();
            showToast(T('saved'), 'success');
            loadPage('guests');
        }

        function saveExpense(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            const expenses = getFromStorage(CONFIG.STORAGE_KEYS.EXPENSES, []);
            
            const newExpense = {
                id: Date.now(),
                name: formData.get('name'),
                categoryId: parseInt(formData.get('categoryId')),
                date: formData.get('date'),
                amount: parseFloat(formData.get('amount'))
            };
            
            expenses.push(newExpense);
            saveToStorage(CONFIG.STORAGE_KEYS.EXPENSES, expenses);
            pushStateToServer(CONFIG.STORAGE_KEYS.EXPENSES).catch(() => {});
            
            hideExpenseForm();
            showToast(T('saved'), 'success');
            loadPage('expenses');
        }

        function deleteGuest(id) {
            if (!checkPermission('delete')) return;
            
            if (confirm('Are you sure you want to delete this guest?')) {
                const guests = getFromStorage(CONFIG.STORAGE_KEYS.GUESTS, []);
                const updatedGuests = guests.filter(guest => guest.id !== id);
                saveToStorage(CONFIG.STORAGE_KEYS.GUESTS, updatedGuests);
                pushStateToServer(CONFIG.STORAGE_KEYS.GUESTS).catch(() => {});
                refreshCheckoutNotificationBadge();
                
                showToast(T('deleted'), 'success');
                loadPage('guests');
            }
        }

        function deleteExpense(id) {
            if (!checkPermission('delete')) return;
            
            if (confirm('Are you sure you want to delete this expense?')) {
                const expenses = getFromStorage(CONFIG.STORAGE_KEYS.EXPENSES, []);
                const updatedExpenses = expenses.filter(expense => expense.id !== id);
                saveToStorage(CONFIG.STORAGE_KEYS.EXPENSES, updatedExpenses);
                pushStateToServer(CONFIG.STORAGE_KEYS.EXPENSES).catch(() => {});
                
                showToast(T('deleted'), 'success');
                loadPage('expenses');
            }
        }

        function exportData(type) {
            if (!checkPermission('export')) return;
            
            let data = {};
            let filename = '';
            
            switch(type) {
                case 'guests':
                    data = { guests: getFromStorage(CONFIG.STORAGE_KEYS.GUESTS, []) };
                    filename = 'motel-guests.json';
                    break;
                case 'expenses':
                    data = { 
                        expenses: getFromStorage(CONFIG.STORAGE_KEYS.EXPENSES, []),
                        categories: getFromStorage(CONFIG.STORAGE_KEYS.CATEGORIES, [])
                    };
                    filename = 'motel-expenses.json';
                    break;
                case 'dashboard':
                    const filteredGuests = getFilteredGuests();
                    const filteredExpenses = getFilteredExpenses();
                    data = {
                        summary: {
                            totalGuests: filteredGuests.length,
                            totalEarnings: filteredGuests.reduce((sum, guest) => sum + getGuestFinalAmount(guest), 0),
                            totalExpenses: filteredExpenses.reduce((sum, expense) => sum + (parseFloat(expense.amount) || 0), 0),
                            dateRange: {
                                from: document.getElementById('fromDate')?.value || 'All time',
                                to: document.getElementById('toDate')?.value || 'All time'
                            }
                        },
                        guests: filteredGuests,
                        expenses: filteredExpenses
                    };
                    filename = 'motel-dashboard-data.json';
                    break;
                case 'all':
                    data = {
                        guests: getFromStorage(CONFIG.STORAGE_KEYS.GUESTS, []),
                        expenses: getFromStorage(CONFIG.STORAGE_KEYS.EXPENSES, []),
                        categories: getFromStorage(CONFIG.STORAGE_KEYS.CATEGORIES, [])
                    };
                    filename = 'motel-all-data.json';
                    break;
            }
            
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('Data exported successfully!', 'success');
        }

        // Event listeners
        document.addEventListener('DOMContentLoaded', function() {
            console.log("DOM loaded, initializing app...");
            
            // Initialize data
            initializeData();
            
            // Check if user is logged in
            const currentUser = getCurrentUser();
            if (currentUser) {
                showApp();
            } else {
                showLogin();
            }
            
            // Login form
            document.getElementById('loginForm').addEventListener('submit', async function(e) {
                e.preventDefault();
                const formData = new FormData(e.target);
                const username = formData.get('username');
                const password = formData.get('password');
                
                try {
                    const user = await login(username, password);
                    if (user) {
                        showToast(T('loginSuccess'), 'success');
                        setTimeout(() => {
                            showApp();
                        }, 600);
                    } else {
                        showToast(T('loginError'), 'error');
                    }
                } catch (err) {
                    showToast(err?.message || T('loginError'), 'error');
                }
            });
            
            // Logout button
            document.getElementById('logoutBtn').addEventListener('click', logout);
            
            // Navigation and language buttons
            document.addEventListener('click', function(e) {
                if (e.target.closest('.nav-btn[data-page]')) {
                    const page = e.target.closest('.nav-btn').dataset.page;
                    loadPage(page);
                }
                
                if (e.target.closest('.lang-btn')) {
                    const lang = e.target.closest('.lang-btn').dataset.lang;
                    currentLang = lang;
                    updatePageText();
                    
                    document.querySelectorAll('.lang-btn').forEach(btn => {
                        btn.classList.remove('active');
                    });
                    e.target.closest('.lang-btn').classList.add('active');
                }
            });
            
            console.log("App initialized successfully!");
        });
    </script>
</body>
</html>
